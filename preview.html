    // Loading Screen
    function LoadingScreen({ onComplete }) {
      const [progress, setProgress] = useState(0);
      const [hidden, setHidden] = useState(false);

      useEffect(() => {
        const interval = setInterval(() => {
          setProgress(prev => {
            if (prev >= 100) {
              clearInterval(interval);
              setTimeout(() => {
                setHidden(true);
                if (onComplete) onComplete();
              }, 400);
              return 100;
            }
            return prev + Math.floor(Math.random() * 15) + 5;
          });
        }, 100);
        return () => clearInterval(interval);
      }, [onComplete]);

      if (hidden) return null;

      return (
        <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#030304] text-white transition-opacity duration-700">

            <span>Initializing Experience</span>
            <span className="text-yellow-400">{progress}%</span>
          </div>
        </div>
      );
    }

            }

              if (el) {

                if (rect.top <= 80 && rect.bottom >= 80) {

                  break;
                }
              }
            }

          {/* Our Services Section */}
          <section id="services" className="py-28 px-6 bg-[#F1F3F7] text-slate-900">
            <div className="max-w-7xl mx-auto">
              <div className="text-center max-w-2xl mx-auto mb-16">
                <span className="text-xs uppercase tracking-[0.3em] text-yellow-700 font-bold">Mercy Dental Clinic Services</span>
                <h2 className="font-serif text-4xl font-light text-slate-900 mt-2">Our <span className="italic font-normal text-gold-gradient">Clinical Services</span></h2>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                {services.map((item, idx) => (
                  <div key={idx} className="relative h-[440px] rounded-[32px] overflow-hidden cursor-pointer shadow-xl transition-all duration-500 border border-slate-300/60 hover:border-yellow-500 group flex flex-col justify-between p-6">
                    <img src={item.img} alt={item.title} className="absolute inset-0 w-full h-full object-cover object-center group-hover:scale-105 transition-transform duration-1000 z-0" />
                    <div className="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/50 to-slate-950/20 pointer-events-none z-10" />
                    
                    <div className="relative z-20 flex items-center justify-between w-full">
                      <span className="px-3 py-1 rounded-full text-[9px] uppercase tracking-widest font-bold bg-black/60 text-yellow-300 border border-yellow-500/40 backdrop-blur-md shadow-md">{item.badge}</span>
                      <span className="font-serif text-2xl text-yellow-400 font-bold drop-shadow-lg">{item.id}</span>
                    </div>

                    <div className="relative z-20 flex flex-col justify-end text-white">
                      <span className="text-[10px] text-yellow-300 uppercase tracking-[0.2em] font-bold mb-1">{item.subtitle}</span>
                      <h3 className="font-serif text-xl md:text-2xl font-bold text-white mb-2 leading-tight drop-shadow-md">{item.title}</h3>
                      <p className="text-xs text-slate-200 font-normal leading-relaxed mb-4 opacity-90 line-clamp-3">{item.desc}</p>
                      <button onClick={scrollToBooking} className="w-full py-3 rounded-full bg-white/10 hover:bg-yellow-400 text-white hover:text-slate-950 font-sans text-[11px] uppercase tracking-widest font-bold border border-white/20 hover:border-yellow-400 backdrop-blur-md transition-all duration-300 flex items-center justify-center gap-2 shadow-lg">
                        <span>Book Consultation</span>
                        <span>→</span>
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Smile Transformation Section */}
          <section id="transformation" className="py-28 px-6 bg-slate-950 text-white">
            <div className="max-w-7xl mx-auto">
              <div className="text-center max-w-2xl mx-auto mb-12">
                <span className="text-xs uppercase tracking-[0.3em] text-yellow-400 font-bold">Mercy Dental Clinic • Madurai</span>
                <h2 className="font-serif text-4xl font-light mt-2">Smile <span className="italic font-normal text-gold-gradient">Restoration Assessment</span></h2>
              </div>

              <div className="relative w-full max-w-4xl mx-auto rounded-3xl overflow-hidden bg-slate-900 border border-yellow-500/40 shadow-2xl p-6 md:p-10">
                <div className="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6 pb-4 border-b border-white/10">
                  <div className="flex items-center gap-2">
                    <span className="w-2.5 h-2.5 rounded-full bg-slate-400" />
                    <span className="text-xs uppercase tracking-widest text-slate-300 font-bold">
                      BEFORE: Initial State (LEFT SIDE)
                    </span>
                  </div>

                  <div className="font-serif text-lg text-yellow-400 font-bold">
                    Single-Sitting RCT & Whitening
                  </div>

                  <div className="flex items-center gap-2">
                    <span className="text-xs uppercase tracking-widest text-yellow-300 font-bold">
                      AFTER: Restored Result (RIGHT SIDE)
                    </span>
                    <span className="w-2.5 h-2.5 rounded-full bg-yellow-400 animate-pulse" />
                  </div>
                </div>

                <div
                  ref={containerRef}
                  className="relative w-full aspect-[16/9] md:aspect-[21/9] rounded-2xl overflow-hidden select-none border border-yellow-500/30 shadow-2xl bg-slate-950 cursor-ew-resize"
                  onMouseMove={(e) => {
                    const rect = e.currentTarget.getBoundingClientRect();
                    const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
                    setSliderPos((x / rect.width) * 100);
                  }}
                  onTouchMove={(e) => {
                    const rect = e.currentTarget.getBoundingClientRect();
                    const x = Math.max(0, Math.min(e.touches[0].clientX - rect.left, rect.width));
                    setSliderPos((x / rect.width) * 100);
                  }}
                >
                  <img
                    src={rightImg}
                    alt="Restored Result Right Side"
                    className="absolute inset-0 w-full h-full object-cover pointer-events-none"
                  />

                  <div
                    className="absolute inset-y-0 left-0 overflow-hidden border-r-2 border-yellow-400 shadow-2xl"
                    style={{ width: `${sliderPos}%` }}
                  >
                    <img
                      src={leftImg}
                      alt="Initial State Left Side"
                      className="absolute top-0 left-0 h-full max-w-none object-cover pointer-events-none"
                      style={{ width: `${containerWidth}px` }}
                    />
                  </div>

                  <div
                    className="absolute top-0 bottom-0 w-1 bg-yellow-400 pointer-events-none flex items-center justify-center"
                    style={{ left: `${sliderPos}%` }}
                  >
                    <div className="w-9 h-9 rounded-full bg-yellow-400 text-slate-950 flex items-center justify-center text-xs font-bold shadow-2xl border-2 border-white">
                      ↔
                    </div>
                  </div>
                </div>

                <div className="mt-4 text-center font-sans text-[11px] text-slate-400 uppercase tracking-widest font-bold">
                  ◄ Drag Slider Left or Right to Compare Patient Smile Results ►
                </div>
              </div>
            </div>
          </section>

          {/* Appointment Section */}
          <section id="appointment" className="py-28 px-6 bg-white text-slate-900">
            <div className="max-w-3xl mx-auto p-10 rounded-3xl bg-[#FAFBFD] border border-yellow-500/40 shadow-xl">
              <div className="text-center mb-8">
                <span className="text-xs uppercase tracking-[0.3em] text-yellow-700 font-bold">Mercy Dental Clinic • Madurai Center</span>
                <h2 className="font-serif text-3xl font-light text-slate-900 mt-1">Book Your <span className="italic font-normal text-gold-gradient">Dental Intake</span></h2>
              </div>
              <form onSubmit={(e) => { e.preventDefault(); alert("Appointment Request Received! Dr. Melvin Raj's team will call you shortly."); }} className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="text" placeholder="Patient Full Name" className="p-4 rounded-xl bg-white border border-slate-300 text-slate-900 text-sm focus:outline-none focus:border-yellow-600 font-medium" required />
                <input type="tel" placeholder="Contact Phone / WhatsApp" className="p-4 rounded-xl bg-white border border-slate-300 text-slate-900 text-sm focus:outline-none focus:border-yellow-600 font-medium" required />
                <input type="text" readOnly value="Tiruppalai, New Natham Road, Madurai" className="p-4 rounded-xl bg-slate-100 border border-slate-300 text-slate-800 text-sm font-bold md:col-span-2" />
                <select className="p-4 rounded-xl bg-white border border-slate-300 text-slate-900 text-sm focus:outline-none focus:border-yellow-600 md:col-span-2 font-medium">
                  <option>Restorative and Esthetic Dentistry</option>
                  <option>Endodontic Treatment (Root Canal)</option>
                  <option>Paediatric Dentistry</option>
                  <option>Orthodontic Treatment (Braces & Aligners)</option>
                  <option>Periodontal Treatment (Gum Care)</option>
                  <option>Prosthetic and Implant Dentistry</option>
                  <option>Minor Oral Surgical Procedures</option>
                  <option>Wisdom Tooth Removal</option>
                </select>
                <button type="submit" className="md:col-span-2 py-4 rounded-full bg-slate-950 text-white text-xs uppercase tracking-[0.25em] font-bold hover:bg-slate-900">
                  Confirm Appointment Request
                </button>
              </form>
            </div>
          </section>

          {/* Footer */}
          <footer className="bg-[#030304] text-white py-12 px-6 border-t border-yellow-500/20 text-center font-sans text-xs tracking-widest uppercase font-bold">
            © {new Date().getFullYear()} Mercy Dental Clinic. No. 582, Tagore Nagar, New Natham Road, Tiruppalai, Madurai - 625014
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
